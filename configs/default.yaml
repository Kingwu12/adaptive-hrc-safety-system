# Default configuration for the adaptive-vs-static HRC safety experiment.
# All tunables live here so the reported experiment is reproducible from one file.
#
# NOTE ON CALIBRATION: values marked "pilot placeholder" MUST be re-measured
# during pilot calibration (see docs/experiment_plan.md) before any reported run.

zones:
  # ISO/TS 15066 Speed-and-Separation Monitoring protective distance:
  #   S0 = K*T + C + Sa
  K: 1.6            # human approach speed toward the robot (m/s), ISO/TS 15066 default
  T: 0.40           # system reaction + stopping time (s) -- PILOT PLACEHOLDER; measure end-to-end
  C: 0.20           # intrusion distance of the sensing system (m)
  Sa: 0.10          # position uncertainty of the operator (m) -- PILOT PLACEHOLDER; measure
  yellow_margin: 1.6  # yellow (warning) radius = yellow_margin * S0
  hysteresis: 0.05  # exit hysteresis band (m); leaving a zone requires clearing boundary + this

features:
  sample_rate_hz: 60
  velocity_window: 5  # samples in the least-squares velocity slope window
  accel_window: 3     # samples in the least-squares acceleration slope window

lhmm:
  states: ["approaching", "working", "retreating", "hazard"]
  # COLD-START ONLY. The reported transition matrix A is FITTED from labelled
  # pilot loops (fit_transitions). Reporting these hand-set numbers would be
  # circular validation -- they exist solely to bootstrap before data exists.
  transition_prior:
    - [0.80, 0.15, 0.03, 0.02]  # from approaching
    - [0.10, 0.80, 0.07, 0.03]  # from working
    - [0.03, 0.07, 0.85, 0.05]  # from retreating
    - [0.20, 0.10, 0.20, 0.50]  # from hazard
  hazard_prob_threshold: 0.35
  hazard_dwell_ticks: 2

envelope:
  # DynamicSSMEnvelope -- the certified speed floor (ISO/TS 15066 SSM with the
  # MEASURED approach speed v_proj, not the fixed K prior). Its stop distance is
  #   S(t) = max(0, v_proj)*T + C + Sa
  # reusing T, C, Sa from the `zones` block (SINGLE SOURCE -- never re-typed here).
  # `ramp` is the band above S(t) over which permissible speed scales 0 -> 1.
  ramp: 0.30          # width (m) of the speed-scaling band above the dynamic stop distance

horizon:
  # Horizon prediction replaces the ~vacuous 16 ms one-step p@A lookahead. We
  # extrapolate where the operator will BE (constant-acceleration) and ask whether
  # they breach the red radius within `horizon_s`, then fuse with the state posterior.
  horizon_s: 0.5          # constant-acceleration lookahead (s)
  imminence_steepness: 8.0  # sigmoid steepness fusing time-to-breach into a risk score
  risk_threshold: 0.35    # sustained risk >= this (for dwell ticks) -> pre-emptive stop
  max_human_accel: 4.0    # clamp on extrapolated accel (m/s^2, ~0.4g) -- rejects jitter
  min_closing_speed: 0.6  # min v_proj (m/s) for a breach to count as imminent (not noise)

controller:
  speed_reduced: 0.35        # speed-slider fraction under reduced-speed command
  working_stability_ticks: 30  # ticks of stable working before treated as steady state
  # P3 hand-guiding: under the CERTIFIED compliant-hold collaborative mode the robot is
  # permitted to hold the panel at this low, force-limited speed fraction while the human
  # nudges it a few mm. The fixed-zone baseline cannot (it protective-stops on the
  # contact), so hand-guiding is FEASIBLE for the envelope rungs and INFEASIBLE for
  # fixed-zone -- the maximum static-vs-adaptive divergence.
  compliant_hold_speed: 0.20

scenario:
  # v2 Panel Cycle: one repeating LOAD -> TRANSIT_UP -> HAND_GUIDE -> HOLD_BOLT ->
  # RELEASE_RETRACT cycle. Stances are distances (m) from the robot's occupied column.
  tcp_position: [0.0, 0.0, 2.2]  # robot TCP holding the panel overhead (m)
  work_radius: 1.1               # generic fastening stance distance from the column (m)
  load_radius: 0.85              # P1: human at the end-effector plate (arm parked at waist)
  prep_radius: 1.25              # P2/P5: tending stance (inside worst-case zone, low closing)
  contact_radius: 0.12           # P3/P4: human directly under the panel (hand-guide / bolt)
  bench_clearance: 0.4           # staging bench sits this far beyond the yellow radius (m)
  walk_speed: 1.2                # nominal walking speed between stances (m/s)
  work_sway_speed: 0.3           # lateral sway while fastening / nudging (m/s)
  slip_speed: 2.2                # rapid lunge speed during the simulated slip (m/s)
  # Cued DISTRACTORS -- fast motions that are NOT hazards (ground-truth non-hazard).
  # They test SPECIFICITY: a good controller must not stop for fast motion that isn't
  # closing on the robot column. See scenario.py docstring.
  distractor_dart_speed: 2.0     # fast LATERAL dart across the work face (m/s; ~zero closing)
  distractor_retreat_speed: 2.0  # sudden fast RETREAT away from the column (m/s; opening)

robot:
  host: "127.0.0.1"   # URSim / UR controller IP
  rtde_port: 30004    # RTDE data port
  dashboard_port: 29999  # Dashboard server port (pause/play for protective stop)
